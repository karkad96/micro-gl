<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>micro-gl — WebGPU demo</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0d0f16;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
      }
      #error {
        display: none;
        position: fixed;
        inset: 0;
        padding: 2rem;
        color: #ffb4b4;
        background: #1a1010;
        font:
          16px/1.5 system-ui,
          sans-serif;
        white-space: pre-wrap;
      }
      #hud {
        position: fixed;
        top: 12px;
        left: 12px;
        display: flex;
        gap: 6px;
        font:
          13px system-ui,
          sans-serif;
        user-select: none;
      }
      #hud button {
        padding: 6px 14px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 6px;
        background: rgba(18, 22, 34, 0.85);
        color: #99a;
        cursor: pointer;
      }
      #hud button:hover {
        color: #fff;
      }
      #hud button.active {
        background: #33508f;
        border-color: #4a6ab8;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="hud">
      <button id="btn-3d" class="active">3D scene</button>
      <button id="btn-2d">2D scene</button>
    </div>
    <div id="error"></div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
